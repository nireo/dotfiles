[buildPlans.HehMono]
family = "HehMono"
spacing = "normal"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

[buildPlans.HehMono.variants.design]
one = "base"
two = "straight-neck-serifless"
four = "closed-serifless"
six = "closed-contour"
eight = "two-circles"
nine = "closed-contour"
zero = "dotted"
capital-d = "more-rounded-serifless"
capital-g = "toothless-corner-serifless-hooked"
capital-q = "straight"
f = "flat-hook-serifless-crossbar-at-x-height"
j = "flat-hook-serifed"
l = "serifed-flat-tailed"
t = "flat-hook-short-neck"
y = "straight-turn-serifless"
capital-eszet = "rounded-serifless"
long-s = "flat-hook-middle-serifed-xh"
eszet = "longs-s-lig-serifless"
lower-eth = "straight-bar"
lower-iota = "serifed-flat-tailed"
lower-lambda = "straight-turn"
lower-tau = "flat-tailed"
lower-upsilon = "casual-serifed"
lower-chi = "semi-chancery-straight-serifless"
lower-psi = "flat-top-serifless"
partial-derivative = "closed-contour"
cyrl-capital-zhe = "straight"
cyrl-zhe = "straight"
cyrl-capital-ka = "straight-serifless"
cyrl-ka = "straight-serifless"
cyrl-em = "hanging-serifless"
cyrl-capital-u = "straight-turn-serifless"
cyrl-u = "straight-turn-serifless"
tittle = "square"
diacritic-dot = "square"
punctuation-dot = "square"
braille-dot = "square"
asterisk = "hex-low"
underscore = "low"
brace = "curly-flat-boundary"
guillemet = "straight"
number-sign = "slanted"
ampersand = "upper-open"
percent = "rings-continuous-slash"
bar = "force-upright"
micro-sign = "tailed-serifless"

[buildPlans.HehMono.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.HehMono.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.HehMono.weights.Light]
shape = 300
menu = 300
css = 300

[buildPlans.HehMono.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.HehMono.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.HehMono.weights.ExtraBold]
shape = 800
menu = 800
css = 800

[buildPlans.HehMono.widths.Condensed]
shape = 500
menu = 3
css = "condensed"

[buildPlans.HehMono.widths.Normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.HehMono.widths.SemiCondensed]
shape = 548
menu = 4
css = "semi-condensed"

[buildPlans.HehMono.widths.SemiExtended]
shape = 658
menu = 6
css = "semi-expanded"

[buildPlans.HehMono.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.HehMono.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
