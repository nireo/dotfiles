# true color support
set -as terminal-features ',xterm-kitty:RGB,xterm-kitty:hyperlinks'
set -g allow-passthrough on
set -g extended-keys on
set -g extended-keys-format csi-u

set -g allow-rename off

# Automatically update window names.
set -g automatic-rename on

set -g automatic-rename-format '#{b:pane_current_path}/#{?@app_name,#{@app_name},#{pane_current_command}}'

# enable mouse support
set -g mouse on

# much faster key repetition
set -s escape-time 0

# default prefix, also available from the keyboard NUM layer
set -g prefix C-b
# help: Prefix C-b — send the prefix key to the application.
bind C-b send-prefix

# help: Prefix ? — show this keybinding reference.
bind ? display-popup -E -w 70% -h 70% "awk '/^# help: / { sub(/^# help: /, \"\"); print }' ~/.tmux.conf | less"

# help: Prefix r — reload ~/.tmux.conf.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# help: Prefix G — move the current pane into a selected window as a horizontal split.
bind G choose-window "join-pane -hs '%%'"
# help: Prefix M — move the current pane into a selected window as a vertical split.
bind M choose-window "join-pane -ht '%%'"
# help: Prefix N — move the current pane into a new window.
bind N break-pane
# help: Prefix E — arrange panes in an even horizontal layout.
bind E select-layout even-horizontal

# help: Prefix X — confirm and kill the current session.
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# help: Prefix S — open the session tree.
bind S choose-tree -Zs
# help: Prefix W — open the window tree.
bind W choose-tree -Zw

# help: Prefix f — fuzzy-find and switch to a window in any session.
bind f display-popup -E -w 80% -h 80% "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | fzf | cut -d' ' -f1 | xargs tmux switch-client -t"

# help: Prefix | — split horizontally in the current pane's directory.
bind | split-window -h -c "#{pane_current_path}"
# help: Prefix - — split vertically in the current pane's directory.
bind - split-window -v -c "#{pane_current_path}"
# help: Prefix c — create a window in the current pane's directory.
bind c new-window -c "#{pane_current_path}"
# Disable tmux's default vertical split key.
unbind '"'
# Disable tmux's default horizontal split key.
unbind %

# help: Prefix p — open a shell popup in the current pane's directory.
bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"

setw -g mode-keys vi
# help: Copy mode v — begin selection.
bind-key -T copy-mode-vi v send -X begin-selection
# help: Copy mode y — copy selection and exit copy mode.
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
# help: Copy mode Escape — cancel selection and exit copy mode.
bind-key -T copy-mode-vi Escape send -X cancel
# help: Copy mode Ctrl-v — toggle rectangular selection.
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
# help: Copy mode Ctrl-u — scroll up half a page.
bind-key -T copy-mode-vi C-u send -X halfpage-up
# help: Copy mode Ctrl-d — scroll down half a page.
bind-key -T copy-mode-vi C-d send -X halfpage-down

# help: Prefix h — select the pane to the left.
bind h select-pane -L
# help: Prefix j — select the pane below.
bind j select-pane -D
# help: Prefix k — select the pane above.
bind k select-pane -U
# help: Prefix l — select the pane to the right.
bind l select-pane -R

# help: Prefix H — resize the pane left by 5 cells; repeatable.
bind -r H resize-pane -L 5
# help: Prefix J — resize the pane down by 5 cells; repeatable.
bind -r J resize-pane -D 5
# help: Prefix K — resize the pane up by 5 cells; repeatable.
bind -r K resize-pane -U 5
# help: Prefix L — resize the pane right by 5 cells; repeatable.
bind -r L resize-pane -R 5

set -g status-style "bg=default,fg=#888F94"
set -g status-left-length 16
set -g status-right-length 32
set -g status-position bottom

set -g status-left ""
set -g status-right "#[fg=#888F94,bg=default] #S #[default]"
set -g status-justify left

set -g window-status-style "fg=#555555,bg=default"
set -g window-status-current-style "fg=#FAFAFA,bg=default,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W* "

set -g window-status-separator ""

set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#CF86C1,bold"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g display-time 1500

set -g message-style "fg=#FAFAFA,bg=#555555"
set -g message-command-style "fg=#FAFAFA,bg=#555555"

# help: Prefix Z — toggle a centered 120×90% shell popup.
bind-key Z if-shell -F '#{@zen_popup}' {
    set-option -u @zen_popup
    display-popup -C
} {
    set-option @zen_popup 1
    display-popup -E \
        -x C -y C \
        -w 120 -h 90% \
        -d '#{pane_current_path}' \
        'cleanup() {
            trap - EXIT HUP INT TERM
            tmux set-option -u @zen_popup 2>/dev/null
            exit
        }
        trap cleanup EXIT HUP INT TERM
        "$SHELL"
        cleanup'
}
