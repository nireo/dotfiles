# true color support
set-option -a terminal-features 'foot:RGB'

# enable mouse support
set -g mouse on

# much faster key repetition
set -s escape-time 0

# default prefix, also available from the keyboard NUM layer
set -g prefix C-b
bind C-b send-prefix

# renumber windows when a window is closed
set -g renumber-windows on

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

bind S choose-session
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind-key p display-popup -E "zsh"

setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g status-style "bg=default,fg=#555555"
set -g status-left-length 16
set -g status-right-length 8
set -g status-position bottom

set -g status-left " #S "
set -g status-right "%H:%M "
set -g status-justify left

set -g window-status-style "fg=#666666,bg=default"
set -g window-status-current-style "fg=#BBBBBB,bg=default"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

set -g window-status-separator ""

set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#555555"
