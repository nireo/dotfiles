# true color support
set-option -a terminal-features 'foot:RGB'

# enable mouse support
set -g mouse on

# much faster key repetition
set -s escape-time 0

# default prefix, also available from the keyboard NUM layer
set -g prefix C-b
bind C-b send-prefix

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

bind X confirm-before -p "Kill session #S? (y/n)" kill-session

bind S choose-tree -Zs
bind W choose-tree -Zw

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

bind p display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "zsh"

setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send -X cancel
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi C-u send -X halfpage-up
bind-key -T copy-mode-vi C-d send -X halfpage-down

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g status-style "bg=#352F2D,fg=#888F94"
set -g status-left-length 16
set -g status-right-length 32
set -g status-position top

set -g status-left ""
set -g status-right "#[fg=#CF86C1,bg=default,bold] #S #[default]%H:%M #[default]"
set -g status-justify left

set -g window-status-style "fg=#888F94,bg=default"
set -g window-status-current-style "fg=#61ABDA,bg=default,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W* "

set -g window-status-separator ""

set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#555555"

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
