[main]
font=MesloLGS Nerd Font:size=11.5:style=Medium
font-italic=MesloLGS Nerd Font:size=11.5:style=Medium
font-bold=MesloLGS Nerd Font:size=11.5:style=Medium
font-bold-italic=MesloLGS Nerd Font:size=11.5:style=Medium

[colors]
background=090909
foreground=B0B0B0

# Selection colors
selection-foreground=B0B0B0
selection-background=1D1D1D

# Normal colors (0-7)
regular0=111111  # black
regular1=B294BB  # red (using purple from Title/Operator)
regular2=88B588  # green (from String)
regular3=B8C78A  # yellow (brighter green variant)
regular4=8AA3C1  # blue (from Keyword)
regular5=B294BB  # magenta (from Title/Operator)
regular6=6B8F8F  # cyan (from Function)
regular7=B0B0B0  # white (from Normal text)

# Bright colors (8-15)
bright0=2A2A2A   # bright black (from borders)
bright1=B294BB   # bright red
bright2=88B588   # bright green
bright3=C9A96E   # bright yellow (commented string color)
bright4=88AAB5   # bright blue (from Type)
bright5=B294BB   # bright magenta
bright6=88afa2   # bright cyan (from Directory/Special)
bright7=FFFFFF   # bright white

# Dim colors (optional, for when dim attribute is used)
dim0=0A0A0A
dim1=7A7A7A
dim2=7A8A9A
dim3=708090
dim4=708090
dim5=7A7A7A
dim6=7A8A9A
dim7=7A7A7A
