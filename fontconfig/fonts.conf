 <alias>
  <family>serif</family>
  <prefer>
   <family>Iosevka Etoile</family>
  </prefer>
 </alias>
 <alias>
  <family>sans-serif</family>
  <prefer>
   <family>Liberation Sans</family>
  </prefer>
 </alias>
 <alias>
  <family>sans</family>
  <prefer>
   <family>Liberation Sans</family>
  </prefer>
 </alias>
 <alias>
  <family>monospace</family>
  <prefer>
   <family>DejaVuSansM Nerd Font Mono</family>
  </prefer>
 </alias>
 <alias>
  <family>mono</family>
  <prefer>
   <family>Inconsolata Nerd Font</family>
  </prefer>
 </alias>
 <dir>~/.fonts</dir>
</fontconfig>
